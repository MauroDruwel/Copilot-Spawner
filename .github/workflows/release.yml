name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile app
        run: python -m compileall -q app.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: JS syntax checks
        run: |
          node --check html/js/app.js
          node --check html/js/login.js
          node --check html/js/main.js
          node --check html/js/utils.js

  create-release:
    name: Create GitHub release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            if [ -z "$TAG" ]; then
              echo "version is required"; exit 1
            fi
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists locally."
            else
              git tag "$TAG"
            fi
            if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
              echo "Tag $TAG already exists on origin."
            else
              git push origin "$TAG"
            fi
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true

